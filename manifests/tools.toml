# porta's built-in tool manifest.
#
# Each [[tool]] declares one or more install strategies:
#   - [tool.script]  run the vendor's own official no-admin installer
#   - [tool.binary]  download a prebuilt archive for the current OS/arch
#   - [tool.source]  git clone + build locally
#
# `porta install <name>` uses `script` if present, otherwise tries `binary`
# and falls back to `source` automatically. `--strategy` forces one.
#
# You can add your own entries (or override these) in
# `$PORTA_HOME/tools.toml` without editing this file.

[[tool]]
name = "ai"
display_name = "Claude Code"
bin_name = "claude"
description = "Anthropic's AI coding CLI, downloaded self-contained into porta's bin (checksum-verified)."

# Installed from the same release endpoint Anthropic's official installer
# uses, but placed inside $PORTA_HOME/bin so the environment stays fully
# self-contained and can be copied between machines. The version pins at
# whatever `latest` resolves to at install time; re-run `porta install ai`
# to update. (glibc Linux builds; on musl distros like Alpine, override the
# URL with the linux-*-musl variant in ~/.porta/tools.toml.)
[tool.binary]
version = "latest"
version_url = "https://downloads.claude.ai/claude-code-releases/latest"

[tool.binary.targets.linux-x86_64]
url = "https://downloads.claude.ai/claude-code-releases/{version}/linux-x64/claude"
archive = "raw"
checksum = { url = "https://downloads.claude.ai/claude-code-releases/{version}/manifest.json", json_path = "platforms.linux-x64.checksum" }

[tool.binary.targets.linux-aarch64]
url = "https://downloads.claude.ai/claude-code-releases/{version}/linux-arm64/claude"
archive = "raw"
checksum = { url = "https://downloads.claude.ai/claude-code-releases/{version}/manifest.json", json_path = "platforms.linux-arm64.checksum" }

[tool.binary.targets.macos-x86_64]
url = "https://downloads.claude.ai/claude-code-releases/{version}/darwin-x64/claude"
archive = "raw"
checksum = { url = "https://downloads.claude.ai/claude-code-releases/{version}/manifest.json", json_path = "platforms.darwin-x64.checksum" }

[tool.binary.targets.macos-aarch64]
url = "https://downloads.claude.ai/claude-code-releases/{version}/darwin-arm64/claude"
archive = "raw"
checksum = { url = "https://downloads.claude.ai/claude-code-releases/{version}/manifest.json", json_path = "platforms.darwin-arm64.checksum" }

[tool.binary.targets.windows-x86_64]
url = "https://downloads.claude.ai/claude-code-releases/{version}/win32-x64/claude.exe"
archive = "raw"
checksum = { url = "https://downloads.claude.ai/claude-code-releases/{version}/manifest.json", json_path = "platforms.win32-x64.checksum" }

[tool.binary.targets.windows-aarch64]
url = "https://downloads.claude.ai/claude-code-releases/{version}/win32-arm64/claude.exe"
archive = "raw"
checksum = { url = "https://downloads.claude.ai/claude-code-releases/{version}/manifest.json", json_path = "platforms.win32-arm64.checksum" }


[[tool]]
name = "ripgrep"
display_name = "ripgrep"
description = "Fast recursive search (rg) — a demonstration binary/source tool entry."

[tool.binary]
version = "14.1.1"

[tool.binary.targets.linux-x86_64]
url = "https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep-14.1.1-x86_64-unknown-linux-musl.tar.gz"
archive = "tar.gz"
binary_path = "ripgrep-14.1.1-x86_64-unknown-linux-musl/rg"

[tool.binary.targets.linux-aarch64]
url = "https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep-14.1.1-aarch64-unknown-linux-gnu.tar.gz"
archive = "tar.gz"
binary_path = "ripgrep-14.1.1-aarch64-unknown-linux-gnu/rg"

[tool.binary.targets.macos-x86_64]
url = "https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep-14.1.1-x86_64-apple-darwin.tar.gz"
archive = "tar.gz"
binary_path = "ripgrep-14.1.1-x86_64-apple-darwin/rg"

[tool.binary.targets.macos-aarch64]
url = "https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep-14.1.1-aarch64-apple-darwin.tar.gz"
archive = "tar.gz"
binary_path = "ripgrep-14.1.1-aarch64-apple-darwin/rg"

[tool.binary.targets.windows-x86_64]
url = "https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep-14.1.1-x86_64-pc-windows-msvc.zip"
archive = "zip"
binary_path = "ripgrep-14.1.1-x86_64-pc-windows-msvc/rg.exe"

[tool.source]
repo = "https://github.com/BurntSushi/ripgrep"
git_ref = "14.1.1"
build_cmd = ["cargo", "build", "--release", "--bin", "rg"]
binary_path = "target/release/rg"
